name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build, for example v1.0.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos-dmg:
    name: Build signed and notarized DMG
    runs-on: macos-latest
    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Import Developer ID certificate
        shell: bash
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          set -euo pipefail
          cert_file="$(mktemp /tmp/ofteml-cert.XXXXXX.p12)"
          keychain_file="/tmp/ofteml-build-${{ github.run_id }}.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$cert_file"
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o /tmp/DeveloperIDG2CA.cer
          security create-keychain -p "$keychain_password" "$keychain_file"
          security set-keychain-settings -lut 21600 "$keychain_file"
          security unlock-keychain -p "$keychain_password" "$keychain_file"
          security import /tmp/DeveloperIDG2CA.cer -k "$keychain_file" -T /usr/bin/codesign
          security import "$cert_file" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$keychain_file"
          security set-key-partition-list -S apple-tool:,apple: -k "$keychain_password" "$keychain_file"
          security list-keychains -d user -s "$keychain_file" $(security list-keychains -d user | tr -d '"')
          identity="$(security find-identity -v -p codesigning "$keychain_file" | grep 'Developer ID Application' | head -1 | sed 's/.*"\(.*\)"/\1/')"
          echo "CODE_SIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
          echo "KEYCHAIN_FILE=$keychain_file" >> "$GITHUB_ENV"
          rm -f "$cert_file" /tmp/DeveloperIDG2CA.cer

      - name: Build signed app and DMG
        env:
          DMG_PATH: dist/OFT-EML-Converter-macos.dmg
        run: |
          chmod +x scripts/*.sh
          scripts/build-release.sh
          scripts/make-dmg.sh

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          DMG_PATH: dist/OFT-EML-Converter-macos.dmg
        run: scripts/notarize-dmg.sh

      - name: Cleanup keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_FILE:-}" ]]; then
            security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OFT-EML-Converter-macos-dmg
          path: |
            dist/OFT-EML-Converter-macos.dmg
            dist/OFT-EML-Converter-macos.dmg.sha256

      - name: Attach assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "OFT EML Converter ${RELEASE_VERSION}" --notes "Signed and notarized macOS DMG."
          fi
          gh release upload "$RELEASE_TAG" "dist/OFT-EML-Converter-macos.dmg" "dist/OFT-EML-Converter-macos.dmg.sha256" --clobber